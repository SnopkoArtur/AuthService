databaseChangeLog:
  - changeSet:
      id: 1
      author: dev
      changes:
        - createTable:
            tableName: user_credentials
            columns:
              - column: {name: id, type: bigint, autoIncrement: true, constraints: {primaryKey: true}}
              - column: {name: login, type: varchar(255), constraints: {unique: true, nullable: false}}
              - column: {name: password, type: varchar(255), constraints: {nullable: false}}
              - column: {name: role, type: varchar(20), constraints: {nullable: false}}
              - column: {name: user_id, type: bigint, constraints: {nullable: false}}